name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project MarkdownPreviewer.xcodeproj \
            -scheme MarkdownPreviewer -configuration Release \
            -derivedDataPath build build

      - name: Test
        run: |
          xcodebuild -project MarkdownPreviewer.xcodeproj \
            -scheme RendererTests -destination 'platform=macOS' test
